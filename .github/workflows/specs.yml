name: Specs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     mongodb_version: ['8.0']
    runs-on: ubuntu-24.04
    name: Mongodb tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install MongoDB 8.0 & mtools
        run: |
          # Import the MongoDB public GPG Key
          curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | \
             sudo gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg --dearmor
          # Create list file for Ubuntu 24.04 (Noble)
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse" | \
             sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-org

          # Install mtools for mlaunch
          python3 -m pip install mtools[all] --break-system-packages

          # Verify installations
          which mongod
          mongod --version
          mlaunch --version

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install

      - name: Run specs (Single)
        run: crystal spec --tag single

      - name: Run specs (ReplicaSet)
        run: crystal spec --tag replicaset
