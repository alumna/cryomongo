name: Specs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     mongodb_version: ['8.0']
    runs-on: ubuntu-24.04
    name: Mongodb tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Start MongoDB ReplicaSet (8.0)
        run: |
          # Start a persistent Replica Set for the Unified Test Runner
          docker run --name mongo -d -p 27017:27017 mongo:8.0 --replSet rs0 --setParameter enableTestCommands=1
          sleep 5
          docker exec mongo mongosh --eval 'rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})'
          sleep 5

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install

      - name: Run Specs
        run: crystal spec
